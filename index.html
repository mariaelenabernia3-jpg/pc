<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro OS Simulator</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Roboto+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="desktop">
        <div class="icon" onclick="os.openPasswordWindow('Mis archivos', '123', 'archivos.png')" id="icon-archivos">
            <img src="archivos.png" alt="Archivos">
            <span>Mis archivos</span>
        </div>
        
        <div class="icon" onclick="os.openPasswordWindow('Papelera', '1984', 'papelera.png')">
            <img src="papelera.png" alt="Papelera">
            <span>Papelera</span>
        </div>
        <div class="icon" onclick="os.openMailApp()">
            <div id="email-badge">1</div>
            <img src="correo.png" alt="Correo">
            <span>Correo</span>
        </div>
        <div class="icon" onclick="os.openChatApp()">
            <img src="chatting.png" alt="Chatting">
            <span>Chatting</span>
        </div>

        <div id="sticky-note">
            <p>WIFI:</p>
            <p class="nota-dato">cyber123</p>
            <p>Usuario:</p>
            <p class="nota-dato">admin</p>
        </div>
    </div>

    <div id="taskbar">
        <div id="taskbar-apps"></div>
        <div id="taskbar-right">
            <div id="wifi-icon" onclick="os.openWifiWindow()">📡 Desconectado</div>
            <div id="clock">00:00</div>
        </div>
    </div>

    <script src="os.js"></script>
</body>
</html>
