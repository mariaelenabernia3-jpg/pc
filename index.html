<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- VITAL PARA CELULARES: Evita que la pantalla haga zoom y se desajuste -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro OS Simulator</title>
    <!-- Importar fuentes: Caveat para la nota, Roboto Mono para la terminal/navegador -->
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Roboto+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- El escritorio con todos los iconos -->
    <div id="desktop">
        <!-- Iconos estáticos que abren apps con 1 clic -->
        <!-- El id icon-archivos es clave para insertar FoxWorld a su lado -->
        <div class="icon" onclick="os.openPasswordWindow('Mis archivos', '123')" id="icon-archivos">
            <img src="archivos.png" alt="Archivos">
            <span>Mis archivos</span>
        </div>
        <!-- FoxWorld se insertará dinámicamente aquí mediante JS después de la instalación -->
        
        <div class="icon" onclick="os.openPasswordWindow('Papelera', '1984')">
            <img src="papelera.png" alt="Papelera">
            <span>Papelera</span>
        </div>
        <div class="icon" onclick="os.openMailApp()">
            <div id="email-badge">1</div>
            <img src="correo.png" alt="Correo">
            <span>Correo</span>
        </div>
        <div class="icon" onclick="os.openChatApp()">
            <img src="chatting.png" alt="Chatting">
            <span>Chatting</span>
        </div>

        <!-- La nota de papel (Post-it) -->
        <div id="sticky-note">
            <p>WIFI:</p>
            <p class="nota-dato">cyber123</p>
            <p>Usuario:</p>
            <p class="nota-dato">admin</p>
        </div>
    </div>

    <!-- La barra de tareas en la parte inferior -->
    <div id="taskbar">
        <div id="wifi-icon" onclick="os.openWifiWindow()">📡 Desconectado</div>
        <div id="clock">00:00</div>
    </div>

    <!-- El motor del sistema operativo (siempre al final para asegurar que el DOM esté cargado) -->
    <script src="os.js"></script>
</body>
</html>
